<!DOCTYPE html>
<html>
<head>
    <title>EB System - Register</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="login-container">
        <h2>User Registration</h2>
        <input type="text" id="regName" placeholder="Full Name">
        <input type="text" id="regPhone" placeholder="Phone Number">
        <input type="text" id="regAddress" placeholder="Address (e.g., Trichy)">
        <input type="password" id="regPassword" placeholder="Password">
        <button onclick="register()">Create Account</button>
        <p><a href="index.html">Already have an account? Login</a></p>
    </div>
    <nav class="navbar">
    <div class="nav-logo">EB System</div>
    <div class="nav-links">
        <a href="index.html">Login</a>
        <a href="register.html">Register</a>
        <a href="dashboard.html">My Dashboard</a>
        <a href="admin.html" class="admin-link">Admin Portal</a>
    </div>
</nav>
</body>
</html>
