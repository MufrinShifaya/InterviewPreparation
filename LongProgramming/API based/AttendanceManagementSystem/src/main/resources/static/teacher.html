<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial, Helvetica, sans-serif; }
        body { background:#e2e8f0; }

        header { background:#0f172a; color:white; padding:25px; text-align:center; }
        header p { color:#94a3b8; margin-top:5px; }

        nav {
            background:#1e293b;
            padding:14px 20px;
            display:flex;
            align-items:center;
            justify-content:space-between;
        }
        nav a { color:white; text-decoration:none; margin-right:20px; font-weight:bold; }
        nav a:hover { color:#38bdf8; }

        .logout-btn {
            background:#ef4444;
            color:white;
            border:none;
            padding:8px 18px;
            border-radius:5px;
            cursor:pointer;
            font-weight:bold;
        }
        .logout-btn:hover { background:#dc2626; }

        .container {
            width:500px;
            background:white;
            margin:40px auto;
            padding:35px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }
        .container h2 { margin-bottom:25px; color:#1e293b; }

        label {
            font-weight:bold;
            display:block;
            margin-bottom:5px;
            color:#374151;
            font-size:14px;
        }
        input, select {
            width:100%;
            padding:12px;
            margin-bottom:20px;
            border:1px solid #cbd5e1;
            border-radius:6px;
            font-size:14px;
        }
        input:focus, select:focus { outline:none; border-color:#2563eb; }

        button.submit {
            width:100%;
            padding:13px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:6px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }
        button.submit:hover { background:#1d4ed8; }

        #message {
            display:none;
            margin-top:15px;
            padding:12px;
            border-radius:6px;
            font-weight:bold;
            text-align:center;
        }

        footer { background:#0f172a; color:#94a3b8; text-align:center; padding:15px; margin-top:40px; }
    </style>
</head>
<body>

<header>
    <h1>JJ College Of Engineering And Technology</h1>
    <p>Teacher Dashboard</p>
</header>

<nav>
    <div>
        <a href="teacher.html">Mark Attendance</a>
        <a href="attendance.html">View Attendance</a>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
</nav>

<div class="container">
    <h2>Mark Attendance</h2>

    <label for="studentId">Student ID</label>
    <input id="studentId" type="text" placeholder="e.g. CSE0001">

    <label for="subject">Subject</label>
    <input id="subject" type="text" placeholder="e.g. DBMS">

    <label for="date">Date</label>
    <input id="date" type="date">

    <label for="period">Period (1 - 8)</label>
    <input id="period" type="number" placeholder="Enter period number" min="1" max="8">

    <label for="status">Status</label>
    <select id="status">
        <option value="Present">Present</option>
        <option value="Absent">Absent</option>
    </select>

    <button type="button" class="submit" onclick="markAttendance()">Submit Attendance</button>

    <div id="message"></div>
</div>

<footer>
    <p>© 2026 JJ College Of Engineering And Technology</p>
</footer>

<script src="teacher.js"></script>
</body>
</html>
