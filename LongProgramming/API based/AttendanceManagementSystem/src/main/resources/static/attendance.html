<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Records</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial, Helvetica, sans-serif; }
        body { background:#f1f5f9; }

        header { background:#0f172a; color:white; text-align:center; padding:25px; }
        header p { color:#94a3b8; margin-top:5px; }

        nav {
            background:#1e293b;
            padding:14px 20px;
            display:flex;
            align-items:center;
            justify-content:space-between;
        }
        nav a { color:white; text-decoration:none; margin-right:20px; font-weight:bold; }
        nav a:hover { color:#38bdf8; }

        .logout-btn {
            background:#ef4444;
            color:white;
            border:none;
            padding:8px 18px;
            border-radius:5px;
            cursor:pointer;
            font-weight:bold;
        }
        .logout-btn:hover { background:#dc2626; }

        .container { width:90%; margin:30px auto; }

        .card {
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            margin-bottom:25px;
        }
        .card h2 { margin-bottom:20px; color:#1e293b; }

        table { width:100%; border-collapse:collapse; }
        table th {
            background:#1e293b;
            color:white;
            padding:12px;
            text-align:center;
        }
        table td {
            padding:12px;
            border-bottom:1px solid #e2e8f0;
            text-align:center;
        }
        table tr:hover { background:#f8fafc; }

        .badge {
            padding:5px 12px;
            border-radius:20px;
            font-size:13px;
            font-weight:bold;
        }
        .present { background:#dcfce7; color:#166534; }
        .absent  { background:#fee2e2; color:#991b1b; }

        .empty-msg {
            text-align:center;
            padding:30px;
            color:#64748b;
            font-size:15px;
        }

        footer { background:#0f172a; color:#94a3b8; text-align:center; padding:15px; margin-top:20px; }
    </style>
</head>
<body>

<header>
    <h1>JJ College Of Engineering And Technology</h1>
    <p>Attendance Records</p>
</header>

<nav>
    <div>
        <a href="student.html">Dashboard</a>
        <a href="attendance.html">My Attendance</a>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
</nav>

<div class="container">

    <div class="card">
        <h2>My Attendance Records</h2>
        <table>
            <thead>
            <tr>
                <th>#</th>
                <th>Subject</th>
                <th>Date</th>
                <th>Period</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody id="attendanceTable">
            <tr>
                <td colspan="5" class="empty-msg">Loading...</td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<footer>
    <p>© 2026 JJ College Of Engineering And Technology</p>
</footer>

<script src="attendance.js"></script>
</body>
</html>
