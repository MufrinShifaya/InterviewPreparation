<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial, Helvetica, sans-serif; }
        body { background:#f1f5f9; }

        header { background:#0f172a; color:white; text-align:center; padding:25px; }
        header p { color:#94a3b8; margin-top:5px; }

        nav {
            background:#1e293b;
            padding:14px 20px;
            display:flex;
            align-items:center;
            justify-content:space-between;
        }
        nav a { color:white; text-decoration:none; margin-right:20px; font-weight:bold; }
        nav a:hover { color:#38bdf8; }

        .logout-btn {
            background:#ef4444;
            color:white;
            border:none;
            padding:8px 18px;
            border-radius:5px;
            cursor:pointer;
            font-weight:bold;
        }
        .logout-btn:hover { background:#dc2626; }

        .container { width:90%; margin:30px auto; }

        .stats {
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
            gap:20px;
            margin-bottom:30px;
        }
        .stat-box {
            background:white;
            padding:25px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }
        .stat-box h3 { color:#64748b; font-size:14px; margin-bottom:10px; }
        .stat-box p  { font-size:42px; font-weight:bold; color:#2563eb; }

        .card {
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            margin-bottom:25px;
        }
        .card h2 { margin-bottom:20px; color:#1e293b; }

        table { width:100%; border-collapse:collapse; }
        table th { background:#1e293b; color:white; padding:12px; text-align:center; }
        table td { padding:12px; border-bottom:1px solid #e2e8f0; text-align:center; }
        table tr:hover { background:#f8fafc; }

        footer { background:#0f172a; color:#94a3b8; text-align:center; padding:15px; margin-top:20px; }
    </style>
</head>
<body>

<header>
    <h1>JJ College Of Engineering And Technology</h1>
    <p>Admin Dashboard</p>
</header>

<nav>
    <div>
        <a href="admin.html">Dashboard</a>
        <a href="attendance.html">Attendance</a>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
</nav>

<div class="container">

    <div class="stats">
        <div class="stat-box">
            <h3>Total Students</h3>
            <p id="totalStudents">...</p>
        </div>
        <div class="stat-box">
            <h3>Total Teachers</h3>
            <p id="totalTeachers">...</p>
        </div>
        <div class="stat-box">
            <h3>Attendance Records</h3>
            <p id="totalAttendance">...</p>
        </div>
    </div>

    <div class="card">
        <h2>Defaulters List (Below 75%)</h2>
        <table id="defaultersTable">
            <tr>
                <th>Student ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Percentage</th>
            </tr>
        </table>
    </div>

</div>

<footer>
    <p>© 2026 JJ College Of Engineering And Technology</p>
</footer>

<script src="admin.js"></script>
</body>
</html>
